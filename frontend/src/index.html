<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>d-IA-gram</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <!-- Apply the saved theme before Angular boots to avoid a light-to-dark flash. -->
  <script>
    try {
      var saved = localStorage.getItem('d-ia-gram-theme');
      var dark = saved ? saved === 'dark' : matchMedia('(prefers-color-scheme: dark)').matches;
      if (dark) document.documentElement.classList.add('dark');
    } catch (e) {}
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
