<div class="flex h-full flex-col">
  <h2 class="px-3 py-2 text-xs font-semibold uppercase tracking-wide text-slate-400">Diagramas</h2>

  <ul class="flex-1 overflow-y-auto">
    @for (diagram of diagrams(); track diagram.id) {
      <li>
        <button
          class="block w-full px-3 py-2 text-left text-sm hover:bg-slate-100"
          [class.bg-blue-50]="diagram.id === selectedId()"
          [class.font-semibold]="diagram.id === selectedId()"
          (click)="selectDiagram.emit(diagram.id)">
          {{ diagram.name }}
        </button>
      </li>
    } @empty {
      <li class="px-3 py-2 text-sm text-slate-400">Nenhum diagrama.</li>
    }
  </ul>

  <form class="border-t border-slate-200 p-2" (submit)="create(); $event.preventDefault()">
    <input
      class="mb-2 w-full rounded border border-slate-300 px-2 py-1 text-sm focus:border-blue-500 focus:outline-none"
      type="text"
      placeholder="Novo diagrama"
      [ngModel]="newName()"
      (ngModelChange)="newName.set($event)"
      name="newDiagramName" />
    <button
      class="w-full rounded bg-blue-600 px-2 py-1 text-sm font-medium text-white hover:bg-blue-700 disabled:opacity-50"
      type="submit"
      [disabled]="!newName().trim()">
      Criar diagrama
    </button>
  </form>
</div>
