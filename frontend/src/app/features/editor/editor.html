<div class="flex h-full flex-col">
  <header class="flex items-center gap-3 border-b border-slate-200 bg-white px-4 py-2">
    <button class="text-sm text-blue-600 hover:underline" (click)="goBack()">← Projetos</button>
    <span class="font-semibold text-slate-700">{{ projectName() }}</span>
    <div class="ml-4 flex-1">
      <app-toolbar
        [saving]="saving()"
        [canDelete]="selectedCell() !== null"
        [selectedTool]="selectedTool()"
        (addNode)="onAddNode($event)"
        (deleteSelected)="onDeleteSelected()"
        (clearDiagram)="onClearDiagram()"
        (toolSelected)="onToolSelected($event)"
        (zoomInRequested)="onZoomIn()"
        (zoomOutRequested)="onZoomOut()"
        (resetZoomRequested)="onResetZoom()"
        (exportRequested)="onExport()"
        (exportPngRequested)="onExportPng()"
        (importRequested)="onImport()" />
    </div>
  </header>

  <div class="flex flex-1 overflow-hidden">
    <aside class="w-52 shrink-0 border-r border-slate-200 bg-slate-50">
      <app-diagram-list
        [diagrams]="diagrams()"
        [selectedId]="selectedDiagramId()"
        (selectDiagram)="onSelectDiagram($event)"
        (createDiagram)="onCreateDiagram($event)" />
    </aside>

    <main class="relative flex-1 overflow-hidden">
      @if (selectedDiagramId()) {
        <app-canvas
          [nodes]="nodes()"
          [edges]="edges()"
          (snapshotChanged)="onSnapshot($event)"
          (selectionChanged)="onSelection($event)" />
      } @else {
        <div class="flex h-full items-center justify-center text-slate-400">
          Crie ou selecione um diagrama para começar.
        </div>
      }
    </main>

    <aside class="w-72 shrink-0 border-l border-slate-200 bg-white">
      <app-properties-panel
        [selected]="selectedCell()"
        (labelChanged)="onLabelChanged($event)" />
    </aside>
  </div>

  @if (showExport()) {
    <app-export-dialog [json]="exportJson()" (closed)="showExport.set(false)" />
  }
  @if (showImport()) {
    <app-import-dialog (imported)="onImported($event)" (closed)="showImport.set(false)" />
  }
</div>
