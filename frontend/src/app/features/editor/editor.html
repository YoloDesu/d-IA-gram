<div class="flex h-full flex-col bg-slate-100 dark:bg-slate-900">
  <header class="flex flex-col border-b border-slate-200 bg-white shadow-sm dark:border-slate-700 dark:bg-slate-800">
    <div class="flex items-center gap-2 px-4 pt-3">
      <span class="flex h-7 w-7 items-center justify-center rounded-md bg-gradient-to-br from-blue-600 to-emerald-500 text-sm font-bold text-white shadow-sm">d</span>
      <h1 class="text-base font-semibold tracking-tight text-slate-800 dark:text-slate-100">d-IA-gram</h1>
      <span class="hidden rounded-full bg-slate-100 px-2 py-0.5 text-xs text-slate-500 sm:inline dark:bg-slate-700 dark:text-slate-300">Editor de fluxogramas</span>
      <div class="ml-auto">
        <app-theme-toggle />
      </div>
    </div>
    <div class="px-3 py-2">
      <app-toolbar
        [canDelete]="selectedCell() !== null"
        [selectedTool]="selectedTool()"
        (addNode)="onAddNode($event)"
        (deleteSelected)="onDeleteSelected()"
        (clearDiagram)="onClearDiagram()"
        (toolSelected)="onToolSelected($event)"
        (zoomInRequested)="onZoomIn()"
        (zoomOutRequested)="onZoomOut()"
        (resetZoomRequested)="onResetZoom()"
        (exportRequested)="onExport()"
        (exportPngRequested)="onExportPng()"
        (importRequested)="onImport()"
        (openMermaidRequested)="onOpenMermaid()" />
    </div>
  </header>

  <div class="flex flex-1 overflow-hidden">
    <main class="relative flex-1 overflow-hidden">
      <app-canvas
        [nodes]="nodes()"
        [edges]="edges()"
        (snapshotChanged)="onSnapshot($event)"
        (selectionChanged)="onSelection($event)" />

      @if (isEmpty()) {
        <div class="pointer-events-none absolute inset-0 flex items-center justify-center">
          <div class="rounded-xl border border-dashed border-slate-300 bg-white/70 px-8 py-6 text-center shadow-sm backdrop-blur-sm dark:border-slate-600 dark:bg-slate-800/70">
            <p class="text-sm font-medium text-slate-600 dark:text-slate-300">Comece seu diagrama</p>
            <p class="mt-1 text-xs leading-relaxed text-slate-400 dark:text-slate-500">
              Adicione um nó pela barra acima<br />
              ou <span class="font-medium text-slate-500 dark:text-slate-400">importe um JSON</span> da LLM.
            </p>
          </div>
        </div>
      }
    </main>

    <aside class="w-72 shrink-0 border-l border-slate-200 bg-white dark:border-slate-700 dark:bg-slate-800">
      <app-properties-panel
        [selected]="selectedCell()"
        (labelChanged)="onLabelChanged($event)" />
    </aside>
  </div>

  @if (showExport()) {
    <app-export-dialog [json]="exportJson()" (closed)="showExport.set(false)" />
  }
  @if (showImport()) {
    <app-import-dialog (imported)="onImported($event)" (closed)="showImport.set(false)" />
  }
</div>
