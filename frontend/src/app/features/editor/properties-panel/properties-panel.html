<div class="p-3">
  <h2 class="mb-3 text-xs font-semibold uppercase tracking-wide text-slate-400 dark:text-slate-500">Propriedades</h2>

  @if (selected(); as cell) {
    <label class="mb-1 block text-xs text-slate-500 dark:text-slate-400">Tipo</label>
    <p class="mb-3 text-sm capitalize text-slate-700 dark:text-slate-200">{{ cell.kind === 'edge' ? 'Conexão' : 'Nó' }}</p>

    <label class="mb-1 block text-xs text-slate-500 dark:text-slate-400" for="cell-label">Rótulo</label>
    <input
      id="cell-label"
      class="w-full rounded border border-slate-300 px-2 py-1 text-sm focus:border-blue-500 focus:outline-none
             dark:border-slate-600 dark:bg-slate-700 dark:text-slate-100 dark:placeholder:text-slate-400"
      type="text"
      [ngModel]="draftLabel()"
      (ngModelChange)="onLabelInput($event)" />
  } @else {
    <p class="text-sm text-slate-400 dark:text-slate-500">Selecione um nó ou conexão para editar.</p>
  }
</div>
