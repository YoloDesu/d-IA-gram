<div class="dialog-backdrop" (click)="closed.emit()">
  <div class="dialog-panel" (click)="$event.stopPropagation()">
    <header class="mb-3 flex items-center justify-between">
      <h2 class="text-lg font-semibold text-slate-800">Importar do LLM</h2>
      <button class="text-slate-400 hover:text-slate-600" (click)="closed.emit()">✕</button>
    </header>

    <p class="mb-2 text-sm text-slate-500">
      Cole o JSON retornado pela LLM. Ele será validado contra o esquema do d-IA-gram.
    </p>

    <textarea
      class="h-72 w-full resize-none rounded border border-slate-300 p-2 font-mono text-xs focus:border-blue-500 focus:outline-none"
      placeholder='{ "$schema": "d-ia-gram-v1", ... }'
      [ngModel]="raw()"
      (ngModelChange)="raw.set($event)"></textarea>

    @if (errors().length > 0) {
      <ul class="mt-2 max-h-28 overflow-y-auto rounded bg-red-50 p-2 text-xs text-red-700">
        @for (error of errors(); track error) {
          <li>• {{ error }}</li>
        }
      </ul>
    }

    <footer class="mt-3 flex justify-end gap-2">
      <button
        class="rounded border border-slate-300 px-3 py-1.5 text-sm hover:bg-slate-50"
        (click)="closed.emit()">
        Cancelar
      </button>
      <button
        class="rounded bg-emerald-600 px-3 py-1.5 text-sm font-medium text-white hover:bg-emerald-700 disabled:opacity-50"
        [disabled]="!raw().trim()"
        (click)="submit()">
        Importar
      </button>
    </footer>
  </div>
</div>
