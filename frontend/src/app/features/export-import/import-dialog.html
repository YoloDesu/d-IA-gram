<div class="dialog-backdrop" (click)="closed.emit()">
  <div class="dialog-panel" (click)="$event.stopPropagation()">
    <header class="mb-3 flex items-center justify-between">
      <h2 class="text-lg font-semibold text-slate-800 dark:text-slate-100">Importar do LLM</h2>
      <button class="text-slate-400 hover:text-slate-600 dark:text-slate-500 dark:hover:text-slate-300" (click)="closed.emit()">✕</button>
    </header>

    <p class="mb-2 text-sm text-slate-500 dark:text-slate-400">
      Importe um arquivo <code>.json</code> ou cole o JSON retornado pela LLM. Ele será validado
      contra o esquema do d-IA-gram.
    </p>

    <label class="mb-2 inline-flex cursor-pointer items-center gap-2 rounded border border-slate-300 bg-white px-3 py-1.5 text-sm text-slate-700 hover:bg-slate-50
                  dark:border-slate-600 dark:bg-slate-700 dark:text-slate-200 dark:hover:bg-slate-600">
      Importar arquivo .json
      <input type="file" accept=".json,application/json" class="hidden" (change)="onFileSelected($event)" />
    </label>

    <textarea
      class="h-72 w-full resize-none rounded border border-slate-300 p-2 font-mono text-xs focus:border-blue-500 focus:outline-none
             dark:border-slate-600 dark:bg-slate-900 dark:text-slate-200"
      placeholder='{ "$schema": "d-ia-gram-v1", ... }'
      [ngModel]="raw()"
      (ngModelChange)="raw.set($event)"></textarea>

    @if (errors().length > 0) {
      <ul class="mt-2 max-h-28 overflow-y-auto rounded bg-red-50 p-2 text-xs text-red-700 dark:bg-red-950 dark:text-red-300">
        @for (error of errors(); track error) {
          <li>• {{ error }}</li>
        }
      </ul>
    }

    <footer class="mt-3 flex justify-end gap-2">
      <button
        class="rounded border border-slate-300 px-3 py-1.5 text-sm hover:bg-slate-50
               dark:border-slate-600 dark:text-slate-200 dark:hover:bg-slate-700"
        (click)="closed.emit()">
        Cancelar
      </button>
      <button
        class="rounded bg-emerald-600 px-3 py-1.5 text-sm font-medium text-white hover:bg-emerald-700 disabled:opacity-50"
        [disabled]="!raw().trim()"
        (click)="submit()">
        Importar
      </button>
    </footer>
  </div>
</div>
